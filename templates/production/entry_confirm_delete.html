{% extends "base.html" %}
{% block title %}Delete Entry{% endblock %}
{% block page_title %}Delete BOM Entry{% endblock %}
{% block content %}
<div class="max-w-sm"><div class="card">
  <p class="text-stone-700 mb-6">Are you sure you want to delete this BOM entry? This will recalculate the job COGS.</p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn-primary bg-red-600 hover:bg-red-700">Delete Entry</button>
    <a href="javascript:history.back()" class="btn-secondary">Cancel</a>
  </form>
</div></div>
{% endblock %}
