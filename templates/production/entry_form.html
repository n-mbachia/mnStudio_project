{% extends "base.html" %}
{% block title %}Edit Entry{% endblock %}
{% block page_title %}Edit BOM Entry{% endblock %}
{% block content %}
<div class="max-w-lg"><div class="card">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}<div><label class="label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary">Save Changes</button>
      <button type="button" onclick="history.back()" class="btn-secondary">Cancel</button>
    </div>
  </form>
</div></div>
{% endblock %}
